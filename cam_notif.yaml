blueprint:
  name: Presence → Notification avec snapshot (URL caméra)
  description: >-
    Envoie une notification mobile avec image. Évite les URLs /api/hassio_ingress
    (souvent inaccessibles pour les notifications). Utilise soit une URL publique,
    soit une entité caméra Home Assistant pour générer une URL /api/camera_proxy.
  domain: automation
  source_url: https://github.com/Kromagnsss/HABP/blob/main/cam_notif.yaml
  input:
    motion_sensor:
      name: Capteur de présence
      selector:
        entity:
          domain: binary_sensor

    notify_device:
      name: Appareil à notifier
      selector:
        device:
          integration: mobile_app

    snapshot_url:
      name: URL snapshot caméra (optionnel)
      description: URL HTTP(S) directe vers une image (éviter /api/hassio_ingress)
      default: ""
      selector:
        text:

    camera_entity:
      name: Entité caméra Home Assistant (optionnel)
      description: >-
        Si renseignée et que l'URL snapshot est vide, le blueprint utilisera
        /api/camera_proxy/<camera>?token=<access_token>.
      default: ""
      selector:
        entity:
          domain: camera

    title:
      name: Titre notification
      default: "Mouvement détecté"
      selector:
        text:

    message:
      name: Message
      default: "Quelqu’un est détecté"
      selector:
        text:

variables:
  snapshot_url_input: !input snapshot_url
  camera_entity_input: !input camera_entity
  resolved_image_url: >-
    {% if snapshot_url_input | trim != '' %}
      {{ snapshot_url_input | trim }}
    {% elif camera_entity_input | trim != '' %}
      /api/camera_proxy/{{ camera_entity_input }}?token={{ state_attr(camera_entity_input, 'access_token') }}
    {% else %}
      {{ '' }}
    {% endif %}

trigger:
  - platform: state
    entity_id: !input motion_sensor
    to: "on"

action:
  - device_id: !input notify_device
    domain: mobile_app
    type: notify
    title: !input title
    message: !input message
    data:
      image: "{{ resolved_image_url }}"
      attachment:
        url: "{{ resolved_image_url }}"

mode: single
